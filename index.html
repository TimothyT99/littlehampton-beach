<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Littlehampton Beach — Watersports Dashboard</title>
  <meta name="description" content="7-day watersports forecast for Littlehampton Beach. Swimming, kayaking and SUP conditions based on tides, waves and weather.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <h1 class="header__title">Littlehampton Beach</h1>
      <p class="header__subtitle">7-Day Watersports Forecast</p>
    </div>
    <div class="header__current" id="current-conditions">
      <div class="current-loading">Loading conditions...</div>
    </div>
  </header>

  <main class="main">
    <div class="legend">
      <span class="legend__item"><span class="dot dot--good"></span> Good</span>
      <span class="legend__item"><span class="dot dot--fair"></span> Fair</span>
      <span class="legend__item"><span class="dot dot--poor"></span> Poor</span>
    </div>

    <div class="cards" id="forecast-cards">
      <div class="loading" id="loading">
        <div class="loading__spinner"></div>
        <p>Fetching forecast data...</p>
      </div>
    </div>

    <div class="detail-panel" id="detail-panel" hidden>
      <button class="detail-panel__close" id="detail-close" aria-label="Close detail panel">&times;</button>
      <h2 class="detail-panel__title" id="detail-title"></h2>
      <div class="detail-panel__content" id="detail-content"></div>
    </div>
  </main>

  <footer class="footer">
    <p>
      Weather data by <a href="https://open-meteo.com/" target="_blank" rel="noopener">Open-Meteo</a> (CC BY 4.0).
      Tidal data by <a href="https://www.admiralty.co.uk" target="_blank" rel="noopener">ADMIRALTY</a>.
    </p>
    <p class="footer__update">Last updated: <span id="last-updated">—</span></p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/scoring.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
